kind = "video"
previewPath = "/diagnostics-demo/"
title = "Data 101 Diagnostics Demo"
version = "1.0.0"
id = "artifacts/diagnostics-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/diagnostics-demo/" ]
localPort = 18582

[services.development]
run = "pnpm --filter @workspace/diagnostics-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diagnostics-demo", "run", "build" ]
publicDir = "artifacts/diagnostics-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18582"
BASE_PATH = "/diagnostics-demo/"
