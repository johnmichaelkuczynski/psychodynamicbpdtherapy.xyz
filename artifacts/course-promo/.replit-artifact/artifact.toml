kind = "video"
previewPath = "/course-promo/"
title = "Evolutionary Psychology for Children — Promo"
version = "1.0.0"
id = "artifacts/course-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/course-promo/" ]
localPort = 22168

[services.development]
run = "pnpm --filter @workspace/course-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/course-promo", "run", "build" ]
publicDir = "artifacts/course-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22168"
BASE_PATH = "/course-promo/"
