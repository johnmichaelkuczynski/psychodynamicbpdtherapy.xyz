kind = "video"
previewPath = "/course-trailer/"
title = "Psychodynamic Therapy 101 — Course Trailer"
version = "1.0.0"
id = "artifacts/course-trailer"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/course-trailer/" ]
localPort = 25642

[services.development]
run = "pnpm --filter @workspace/course-trailer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/course-trailer", "run", "build" ]
publicDir = "artifacts/course-trailer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25642"
BASE_PATH = "/course-trailer/"
